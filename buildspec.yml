version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo Installing dependencies...
      - npm ci

  pre_build:
    commands:
      - echo Running unit tests...
      - npm test
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 478715309921.dkr.ecr.us-east-1.amazonaws.com

  build:
    commands:
      - echo Building the Docker image...
      - docker build -t gocart .
      - echo Tagging the Docker image...
      - docker tag gocart:latest 478715309921.dkr.ecr.us-east-1.amazonaws.com/gocart:latest

  post_build:
    commands:
      - echo Pushing the Docker image to Amazon ECR...
      - docker push 478715309921.dkr.ecr.us-east-1.amazonaws.com/gocart:latest
      - echo Creating imagedefinitions.json file for ECS deployment...
      - echo '[{"name":"gocart-test-container","imageUri":"478715309921.dkr.ecr.us-east-1.amazonaws.com/gocart:latest"}]' > imagedefinitions.json
artifacts:
  files:
    - imagedefinitions.json
